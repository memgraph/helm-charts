apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-gateway-nginx
  namespace: remote-monitoring
data:
  default.conf: |
    server {
      listen 8080;
      auth_basic "Monitoring gateway";
      auth_basic_user_file /etc/nginx/.htpasswd;

      location /api/v1/ {
        proxy_pass http://vmsingle.remote-monitoring.svc.cluster.local:8428;
      }

      location /loki/api/v1/push {
        proxy_pass http://victoria-logs.remote-monitoring.svc.cluster.local:9428/insert/loki/api/v1/push;
      }

      location /select/ {
        proxy_pass http://victoria-logs.remote-monitoring.svc.cluster.local:9428/select/;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle
  namespace: remote-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmsingle
  template:
    metadata:
      labels:
        app: vmsingle
    spec:
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:latest
          args:
            - -retentionPeriod=1
          ports:
            - containerPort: 8428
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  namespace: remote-monitoring
spec:
  selector:
    app: vmsingle
  ports:
    - name: http
      port: 8428
      targetPort: 8428
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-logs
  namespace: remote-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-logs
  template:
    metadata:
      labels:
        app: victoria-logs
    spec:
      containers:
        - name: victoria-logs
          image: victoriametrics/victoria-logs:latest
          ports:
            - containerPort: 9428
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
  namespace: remote-monitoring
spec:
  selector:
    app: victoria-logs
  ports:
    - name: http
      port: 9428
      targetPort: 9428
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-gateway
  namespace: remote-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-gateway
  template:
    metadata:
      labels:
        app: monitoring-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command: ["/bin/sh", "-ec"]
          args:
            - |
              until getent hosts vmsingle.remote-monitoring.svc.cluster.local >/dev/null 2>&1 && \
                    getent hosts victoria-logs.remote-monitoring.svc.cluster.local >/dev/null 2>&1; do
                echo "Waiting for remote-monitoring service DNS records..."
                sleep 2
              done
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: auth
              mountPath: /etc/nginx/.htpasswd
              subPath: .htpasswd
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: monitoring-gateway-nginx
        - name: auth
          secret:
            secretName: monitoring-basic-auth-htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-gateway
  namespace: remote-monitoring
spec:
  selector:
    app: monitoring-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080

image:
  repository: docker.io/memgraph/memgraph
  # It is a bad practice to set the image tag name to 'latest' as it can trigger automatic upgrade of the charts
  # With some of the pullPolicy values. Please consider fixing the tag to a specific Memgraph version
  tag: 3.11.0
  pullPolicy: IfNotPresent

storage:
  data:
    libPVCSize: "1Gi"
    libStorageAccessMode: "ReadWriteOnce"
    # By default the name of the storage class isn't set which means that the default storage class will be used.
    # If you set any name, such storage class must exist.
    libStorageClassName:
    createLogStorageClaim: true
    logPVCSize: "1Gi"
    logStorageAccessMode: "ReadWriteOnce"
    logStorageClassName:
    ## Create a Persistant Volume Claim for core dumps.
    createCoreDumpsClaim: false
    coreDumpsStorageClassName:
    coreDumpsStorageSize: 10Gi
    coreDumpsMountPath: /var/core/memgraph
    coreDumpsImage:
      repository: docker.io/library/busybox
      tag: 1.37.0
      pullPolicy: IfNotPresent
    # Supports Helm templating (e.g. {{ .Release.Name }})
    extraVolumes: []
    # extraVolumes:
    #   - name: secret-volume
    #     secret:
    #       secretName: my-secret
    #       items:
    #         - key: hello_world.txt
    #           path: hello_world.txt
    extraVolumeMounts: []
    # Example:
    # extraVolumeMounts:
    #   - name: secret-volume
    #     mountPath: /etc/memgraph/secret
    #     readOnly: true

  coordinators:
    libPVCSize: "1Gi"
    libStorageAccessMode: "ReadWriteOnce"
    # By default the name of the storage class isn't set which means that the default storage class will be used.
    # If you set any name, such storage class must exist.
    libStorageClassName:
    createLogStorageClaim: true
    logPVCSize: "1Gi"
    logStorageAccessMode: "ReadWriteOnce"
    logStorageClassName:
    ## Create a Persistant Volume Claim for core dumps.
    createCoreDumpsClaim: false
    coreDumpsStorageClassName:
    coreDumpsStorageSize: 10Gi
    coreDumpsMountPath: /var/core/memgraph
    coreDumpsImage:
      repository: docker.io/library/busybox
      tag: 1.37.0
      pullPolicy: IfNotPresent
    # Supports Helm templating (e.g. {{ .Release.Name }})
    extraVolumes: []
    # Example:
    # extraVolumes:
    #   - name: secret-volume
    #     secret:
    #       secretName: my-secret
    #       items:
    #         - key: hello_world.txt
    #           path: hello_world.txt
    extraVolumeMounts: []
    # Example:
    # extraVolumeMounts:
    #   - name: secret-volume
    #     mountPath: /etc/memgraph/secret
    #     readOnly: true

ports:
  boltPort: 7687
  managementPort: 10000
  replicationPort: 20000
  coordinatorPort: 12000
  metricsPort: 9091

externalAccessConfig:
  dataInstance:
    # Empty = no external access service will be created
    serviceType: ""
    annotations: {} # Set of annotations applied to all data instances' services
    # Example:
    # annotations:
    # external-dns.alpha.kubernetes.io/hostname: "coordinators.memgraph.example.com"
  coordinator:
    # Empty = no external access service will be created
    serviceType: ""
    annotations: {} # Set of annotations applied to all coordinators' services
  gateway:
    enabled: false
    gatewayClassName: "" # Required when creating a new Gateway. Name of a pre-existing GatewayClass (e.g., "eg" for Envoy Gateway)
    existingGatewayName: "" # If set, skip Gateway creation and attach routes to this existing Gateway
    existingGatewayNamespace: "" # Namespace of the existing Gateway. Defaults to release namespace if empty
    annotations: {}
    labels: {}
    dataPortBase: 9000 # Data instance ports: dataPortBase + array index (9000, 9001, ...)
    coordinatorPortBase: 9010 # Coordinator ports: coordinatorPortBase + coordinator id (9011, 9012, ...)

headlessService:
  enabled: false # If set to true, each data and coordinator instance will use headless service

# Affinity controls the scheduling of the memgraph-high-availability pods.
# By default data pods will avoid being scheduled on the same node as other data pods,
# and coordinator pods will avoid being scheduled on the same node as other coordinator pods.
# Deployment won't fail if there is no sufficient nodes.
affinity:
  # The unique affinity, will schedule the pods on different nodes in the cluster.
  # This means coordinators and data nodes will not be scheduled on the same node. If there are more pods than nodes, deployment will fail.
  unique: false
  # The parity affinity, will enable scheduling of the pods on the same node, but with the rule that one node can host pair made of coordinator and data node.
  # This means each node can have max two pods, one coordinator and one data node. If not sufficient nodes, deployment will fail.
  parity: false
  # The nodeSelection affinity, will enable scheduling of the pods on the nodes with specific labels. So the coordinators will be scheduled on the nodes with label coordinator-node and data nodes will be scheduled on the nodes with label data-node. If not sufficient nodes, deployment will fail.
  nodeSelection: false
  roleLabelKey: "role"
  dataNodeLabelValue: "data-node"
  coordinatorNodeLabelValue: "coordinator-node"

# If you are experiencing issues with the sysctlInitContainer, you can disable it here.
# This is made to increase the max_map_count, necessary for high memory loads in Memgraph
# If you are experiencing crashing pod with the: Max virtual memory areas vm.max_map_count is too low
# you can increase the maxMapCount value.
# You can see what's the proper value for this parameter by reading
# https://memgraph.com/docs/database-management/system-configuration#recommended-values-for-the-vmmax_map_count-parameter
sysctlInitContainer:
  enabled: true
  maxMapCount: 262144
  image:
    repository: docker.io/library/busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent

# Some storage drivers (notably rancher.io/local-path) do not honor pod-level fsGroup,
# leaving the volume root owned by root:root. Because Memgraph runs as a non-root user,
# its storage directory ownership assertion (process euid == data directory owner uid)
# fails on startup. When enabled, an init container runs as root and chowns the lib,
# log, and core-dumps mount points to memgraphUserId:memgraphGroupId before Memgraph
# starts
fixOwnershipInitContainer:
  enabled: false
  image:
    repository: docker.io/library/busybox
    tag: 1.37.0
    pullPolicy: IfNotPresent

# This is fine because under both
# Memgraph and Mage images we actually hard-code the user and group id.
memgraphUserId: 101
memgraphGroupId: 103

secrets:
  name: memgraph-secrets
  licenseKey: MEMGRAPH_ENTERPRISE_LICENSE
  organizationKey: MEMGRAPH_ORGANIZATION_NAME

labels:
  coordinators:
    podLabels: {}
    statefulSetLabels: {}
    serviceLabels: {}
  data:
    podLabels: {}
    statefulSetLabels: {}
    serviceLabels: {}

container:
  data:
    terminationGracePeriodSeconds: 30 # Make sure to increase this value if --storage-snapshot-on-exit=true so that snapshot can be successfully created on exit. The concrete value depends
    # on the amount of data in your database
    # Probes are hard-coded to tcpSocket against ports.boltPort. Only timings below are configurable.
    readinessProbe:
      failureThreshold: 20
      timeoutSeconds: 10
      periodSeconds: 5
    livenessProbe:
      failureThreshold: 20
      timeoutSeconds: 10
      periodSeconds: 5
    # When restoring Memgraph from a backup, it is important to give enough time app to start. Here, we set it to 2h by default.
    startupProbe:
      failureThreshold: 1440
      timeoutSeconds: 10
      periodSeconds: 5
  coordinators:
    terminationGracePeriodSeconds: 30 # Make sure to increase this value if --storage-snapshot-on-exit=true so that snapshot can be successfully created on exit. The concrete value depends
    # on the amount of data in your databas
    # Probes are hard-coded to tcpSocket against ports.coordinatorPort. Only timings below are configurable.
    readinessProbe:
      failureThreshold: 20
      timeoutSeconds: 10
      periodSeconds: 5
    livenessProbe:
      failureThreshold: 20
      timeoutSeconds: 10
      periodSeconds: 5
    startupProbe:
      failureThreshold: 20
      timeoutSeconds: 10
      periodSeconds: 5

resources:
  data: {}
  coordinators: {}

updateStrategy:
  type: RollingUpdate # Set to OnDelete to support ISSU

# Selects the OpenMetrics format. When true, Memgraph runs with
# --metrics-format=OpenMetrics and exposes its metrics port, and any scraper you
# enable hits that endpoint directly instead of the mg-exporter. Requires Memgraph >= 3.11.
# NOTE: this flag only switches the format/target — on its own it does NOT scrape
# anything. You must also enable a scraper:
#   - in-cluster:  prometheus.serviceMonitor.enabled=true (uses kube-prometheus-stack)
#   - remote:      vmagentRemote.enabled=true
# When false, those scrapers read the mg-exporter instead (needs prometheus.enabled=true).
scrapeMemgraphDirectly: false

prometheus:
  enabled: false
  namespace: "" # Namespace where K8s resources from mg-exporter.yaml will be installed and where your kube-prometheus-stack chart is installed, if empty, uses release namespace.
  memgraphExporter:
    port: 9115
    pullFrequencySeconds: 5
    repository: docker.io/memgraph/prometheus-exporter
    tag: 0.2.3
    # TLS settings used by the exporter when scraping Memgraph instances over https.
    # Only applied to instances that have tls.bolt.enabled=true.
    #   - skipVerify: if true, the exporter does not verify Memgraph's server cert.
    #   - caSecretName: name of a pre-created Secret containing the CA bundle. When set
    #     (and skipVerify=false), the chart mounts the Secret at /etc/mg-exporter/ssl
    #     and passes ca_file=/etc/mg-exporter/ssl/<caSecretKey> to the exporter.
    #   - caSecretKey: key inside the Secret holding the CA cert (default ca.crt).
    tls:
      skipVerify: true
      caSecretName: ""
      caSecretKey: ca.crt
    extraVolumes: []
    extraVolumeMounts: []
    # extraVolumes:
    #   - name: config-volume-setting
    #     configMap:
    #       name: exporter-custom-configs
    # extraVolumeMounts:
    #   - name: config-volume-setting
    #     mountPath: /etc/memgraph-exporter
    #     readOnly: true
  serviceMonitor:
    # When enabled, the chart creates a ServiceMonitor. It scrapes the mg-exporter
    # by default, or Memgraph's OpenMetrics endpoint directly when the top-level
    # scrapeMemgraphDirectly=true.
    enabled: false
    kubePrometheusStackReleaseName: kube-prometheus-stack
    interval: 15s
  # Provision the generated "Memgraph OpenMetrics" Grafana dashboard as a ConfigMap
  # for a Grafana sidecar (e.g. kube-prometheus-stack) to auto-load. The dashboard
  # uses a datasource template variable, so it binds to Grafana's default Prometheus.
  grafanaDashboard:
    enabled: false
    # Namespace for the ConfigMap; must be one the Grafana sidecar watches (default:
    # prometheus.namespace, else the release namespace).
    namespace: ""
    # Label the Grafana sidecar selects dashboards by.
    label: grafana_dashboard

## Optional: vmagent for remote monitoring cluster – scrapes Memgraph metrics
## (and optionally kube-state-metrics / node-exporter / kubelet when vmagentRemote.kubernetes.enabled=true)
## and remote-writes to VictoriaMetrics (or any Prometheus remote-write endpoint).
## By default it scrapes the mg-exporter (requires prometheus.enabled=true), or
## Memgraph's OpenMetrics endpoint directly when the top-level scrapeMemgraphDirectly=true.
## If vmagentRemote.enabled=true and you only need remote_write, set prometheus.serviceMonitor.enabled=false
## to avoid duplicate scraping of mg-exporter by both vmagent and kube-prometheus.
vmagentRemote:
  enabled: false
  namespace: "" # Defaults to prometheus.namespace when empty
  image:
    repository: victoriametrics/vmagent
    tag: v1.139.0
    pullPolicy: IfNotPresent
  remoteWrite:
    url: "" # e.g. http://vmsingle.monitoring.svc.cluster.local:8428/api/v1/write
    basicAuth:
      secretName: ""
      usernameKey: username
      passwordKey: password
  scrapeInterval: 15s
  externalLabels: {}
  kubernetes:
    enabled: false # Enable scraping of Kubernetes infrastructure metrics used by kube-prometheus dashboards.
    kubeStateMetrics:
      enabled: true
      jobName: kube-state-metrics
      targets:
        - kube-prometheus-stack-kube-state-metrics.monitoring.svc.cluster.local:8080
    nodeExporter:
      enabled: true
      jobName: node-exporter
      # When enabled, scrape node-exporter pods via Kubernetes discovery so
      # namespace/pod/node labels are present for kube-prometheus recording rules.
      useKubernetesDiscovery: false
      podMetricsPort: "9100"
      appNameLabel: prometheus-node-exporter
      appInstanceLabel: kube-prometheus-stack-prometheus-node-exporter
      targets:
        - kube-prometheus-stack-prometheus-node-exporter.monitoring.svc.cluster.local:9100
    kubelet:
      enabled: true
      # Keep the default job label expected by kube-prometheus dashboards and recording rules.
      jobName: kubelet
      # Scrape kubelet cAdvisor metrics via Kubernetes API server node proxy.
      metricsPath: /metrics/cadvisor
      # Also scrape kubelet /metrics
      additionalMetricsEnabled: true
      additionalJobName: kubelet-metrics
      additionalMetricsPath: /metrics
      apiServerAddress: kubernetes.default.svc:443
      # Set to true only if your cluster uses an untrusted kube-apiserver serving cert chain.
      insecureSkipVerify: false
  resources: {}
  httpPort: 8429 # vmagent local HTTP listen port (metrics/debug); remote write target is remoteWrite.url

## Optional: Vector sidecar for remote monitoring cluster – exports Memgraph logs via websocket to VictoriaLogs (Loki-compatible API) or any Loki endpoint.
## Add to data and/or coordinator pods. Ensure Memgraph instance args include monitoring flags:
## --monitoring-port=<vectorRemote.websocketPort> and --monitoring-address=0.0.0.0.
vectorRemote:
  enabled: false
  # Add Vector sidecar to data instance pods
  data: true
  # Add Vector sidecar to coordinator pods
  coordinators: true
  websocketPort: 7444 # Memgraph monitoring websocket port used by both chart args and Vector sidecars
  image:
    repository: timberio/vector
    tag: 0.49.0-debian
    pullPolicy: IfNotPresent
  logsEndpoint: ""
  auth:
    secretName: ""
    usernameKey: username
    passwordKey: password
  extraLabels: {} # e.g. cluster_id, service_name, cluster_env; role is set per pod type (data/coordinator)
  resources: {}

extraEnv:
  data: []
  # Example
  # data:
  #   - name: DATA_LABEL_ONE
  #     value: "123"
  #   - name: DATA_LABEL_TWO
  #     value: "labellinho"
  coordinators: []
  # Example
  # coordinators:
  #   - name: COORD_ONE
  #     value: "coord"
  #   - name: COORD_TWO
  #     value: "two_rr"

## @param initContainers Add additional init containers for data instances and coordinators
## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
## e.g:
## initContainers:
##  - name: your-image-name
##    image: your-image
##    imagePullPolicy: Always
##    command: ['sh', '-c', 'echo "hello world"']
##
initContainers:
  data: []
  coordinators: []

commonArgs:
  data: # Common args for data instances
    logging:
      log_level: "TRACE" # Must not be empty.
      also_log_to_stderr: true # Can only be bool
      log_file: "/var/log/memgraph/memgraph.log" # If empty, log file won't be created
      log_retention_days: 35 # For how many days should logs get persisted
  coordinators: # Common args for coordinator instances
    logging:
      log_level: "TRACE" # Must not be empty.
      also_log_to_stderr: true # Can only be bool
      log_file: "/var/log/memgraph/memgraph.log" # If empty, log file won't be created
      log_retention_days: 35

# If setting the --memory-limit flag under data instances, check that the amount of resources that a pod has been given is more than the actual memory limit you give to Memgraph
# Setting the Memgraph's memory limit to more than the available resources can trigger pod eviction and restarts before Memgraph can make a query exception and continue running
# the pod.
data:
  - id: "0"
    restoreDataFromSnapshot: false
    volumeSnapshotName: data-0-snap # Used only if restoreDataFromSnapshot is set to true
    internalAccessAnnotations: {} # Per-instance annotations for internal ClusterIP service
    externalAccessAnnotations: {} # Per-instance annotations for external access service (merged with externalAccessConfig.dataInstance.annotations, per-instance takes precedence)
    tls:
      bolt:
        enabled: false
        secretName: bolt-tls-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
      intraCluster:
        enabled: false
        secretName: intra-tls-data-0-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
        caSecretPath: ca.crt
    # Example
    # externalAccessAnnotations:
    # external-dns.alpha.kubernetes.io/hostname: "data-0.memgraph.example.com"
    # If vectorRemote.enabled=true, add the following args for each data instance:
    #   - "--monitoring-port=<vectorRemote.websocketPort>"
    #   - "--monitoring-address=0.0.0.0"
    args: # Args specific to this instance
      - "--storage-snapshot-on-exit=false"

  - id: "1"
    restoreDataFromSnapshot: false
    volumeSnapshotName: data-1-snap
    internalAccessAnnotations: {}
    externalAccessAnnotations: {}
    tls:
      bolt:
        enabled: false
        secretName: bolt-tls-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
      intraCluster:
        enabled: false
        secretName: intra-tls-data-1-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
        caSecretPath: ca.crt
    args:
      - "--storage-snapshot-on-exit=false"

coordinators:
  - id: "1"
    restoreDataFromSnapshot: false
    volumeSnapshotName: coord-1-snap
    internalAccessAnnotations: {}
    externalAccessAnnotations: {}
    tls:
      bolt:
        enabled: false
        secretName: bolt-tls-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
      intraCluster:
        enabled: false
        secretName: intra-tls-coord-1-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
        caSecretPath: ca.crt
    args: []

  - id: "2"
    restoreDataFromSnapshot: false
    volumeSnapshotName: coord-2-snap
    internalAccessAnnotations: {}
    externalAccessAnnotations: {}
    tls:
      bolt:
        enabled: false
        secretName: bolt-tls-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
      intraCluster:
        enabled: false
        secretName: intra-tls-coord-2-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
        caSecretPath: ca.crt
    args: []

  - id: "3"
    restoreDataFromSnapshot: false
    volumeSnapshotName: coord-3-snap
    internalAccessAnnotations: {}
    externalAccessAnnotations: {}
    tls:
      bolt:
        enabled: false
        secretName: bolt-tls-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
      intraCluster:
        enabled: false
        secretName: intra-tls-coord-3-secret
        certSecretPath: tls.crt
        keySecretPath: tls.key
        caSecretPath: ca.crt
    args: []

userContainers:
  data: []
  coordinators: []
  # Example:
  # coordinators:
  #  - name: my-debugger
  #    image: docker.io/library/busybox:1.37.0
  #    command: ["sh", "-c", "echo hi; sleep 10000"]

coreDumpUploader:
  enabled: false
  image:
    repository: amazon/aws-cli
    tag: 2.33.28
    pullPolicy: IfNotPresent
  s3BucketName: "memgraph-ha-cluster"
  s3Prefix: "core-dumps"
  awsRegion: "eu-west-1"
  pollIntervalSeconds: 30
  # Name of the K8s Secret containing AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
  secretName: "aws-s3-credentials"
  accessKeySecretKey: "AWS_ACCESS_KEY_ID"
  secretAccessKeySecretKey: "AWS_SECRET_ACCESS_KEY"

tolerations:
  data: []
  # Example:
  # data:
  #   - key: "key2"
  #     operator: "Equal"
  #     value: "value2"
  #     effect: "NoSchedule"
  coordinators: []
  # Example:
  # coordinators:
  #   - key: "key1"
  #     operator: "Equal"
  #     value: "value1"
  #     effect: "NoSchedule"

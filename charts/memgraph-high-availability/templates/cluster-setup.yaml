{{- $hasCert := false }}
  {{- $hasKey := false }}
  {{- range (index .Values.coordinators 0).args }}
    {{- if hasPrefix "--bolt-cert-file" . }}{{- $hasCert = true }}{{- end }}
    {{- if hasPrefix "--bolt-key-file" . }}{{- $hasKey = true }}{{- end }}
  {{- end }}
  {{- $useSSL := and $hasCert $hasKey | ternary "--use-ssl" "" }}

apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-setup
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: cluster-setup
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -Eeuo pipefail

              echo "Waiting for Memgraph coordinators to be ready..."

              # Function to wait for a service to be ready
              wait_for_service() {
                local host=$1
                local port=$2
                local max_attempts=60
                local attempt=0

                while [ $attempt -lt $max_attempts ]; do
                  echo "Checking $host:$port (attempt $((attempt+1))/$max_attempts)"

                  if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$host/$port" 2>/dev/null; then
                    echo "✅ $host:$port is ready"
                    return 0
                  fi

                  attempt=$((attempt+1))
                  sleep 5
                done

                echo "❌ Timeout waiting for $host:$port"
                return 1
              }

              # Wait for all coordinators
              {{- range .Values.coordinators }}
              wait_for_service "memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local" {{ $.Values.ports.boltPort }}
              {{- end }}

              # Wait for all data instances
              {{- range .Values.data }}
              wait_for_service "memgraph-data-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local" {{ $.Values.ports.boltPort }}
              {{- end }}

              PRIMARY_COORD_HOST="memgraph-coordinator-{{ (index .Values.coordinators 0).id }}.{{ .Release.Namespace }}.svc.cluster.local"
              PRIMARY_COORD_PORT="{{ $.Values.ports.boltPort }}"

              run_mgconsole() {
                local query="$1"
                echo "$query" | mgconsole {{ $useSSL }} --host "$PRIMARY_COORD_HOST" --port "$PRIMARY_COORD_PORT" 2>&1
              }

              wait_for_query_readiness() {
                local max_attempts=60
                local attempt=0

                while [ $attempt -lt $max_attempts ]; do
                  echo "Checking coordinator query readiness (attempt $((attempt+1))/$max_attempts)"
                  if run_mgconsole "SHOW INSTANCES;" >/dev/null; then
                    echo "✅ Coordinator query path is ready"
                    return 0
                  fi

                  attempt=$((attempt+1))
                  sleep 5
                done

                echo "❌ Timeout waiting for coordinator query readiness"
                return 1
              }

              run_ddl_with_retries() {
                local step="$1"
                local query="$2"
                local max_attempts=20
                local attempt=0
                local show_instances_output

                ddl_already_applied() {
                  local current_step="$1"
                  show_instances_output="$(run_mgconsole 'SHOW INSTANCES;' 2>/dev/null || true)"
                  [[ -z "$show_instances_output" ]] && return 1

                  case "$current_step" in
                    "ADD COORDINATOR "*)
                      local coordinator_id="${current_step##* }"
                      [[ "$show_instances_output" == *"\"coordinator_${coordinator_id}\""* ]]
                      ;;
                    "REGISTER INSTANCE "*)
                      local instance_name="${current_step##* }"
                      [[ "$show_instances_output" == *"\"${instance_name}\""* ]]
                      ;;
                    *)
                      return 1
                      ;;
                  esac
                }

                while [ $attempt -lt $max_attempts ]; do
                  if ddl_already_applied "$step"; then
                    echo "ℹ️ ${step} already present in cluster state; continuing"
                    return 0
                  fi

                  set +e
                  local output
                  output="$(run_mgconsole "$query")"
                  local status=$?
                  set -e

                  if [ "$status" -eq 0 ]; then
                    echo "✅ ${step} succeeded"
                    return 0
                  fi

                  local output_lc="${output,,}"

                  # Retry-safe handling for partially applied hook runs.
                  if [[ "$output_lc" == *"already exists"* ]] || \
                     [[ "$output_lc" == *"already set"* ]] || \
                     [[ "$output_lc" == *"already a main"* ]] || \
                     [[ "$output_lc" == *"is already main"* ]] || \
                     [[ "$output_lc" == *"request forwarded to the leader but leader failed with request processing"* ]]; then
                    if [[ "$output_lc" == *"already a main"* ]] || [[ "$output_lc" == *"is already main"* ]]; then
                      echo "ℹ️ ${step} already applied; continuing"
                      return 0
                    elif ddl_already_applied "$step"; then
                      echo "ℹ️ ${step} already applied; continuing"
                      return 0
                    fi
                  fi

                  attempt=$((attempt+1))

                  # Keep retrying by default
                  echo "⏳ ${step} failed (attempt ${attempt}/${max_attempts}); retrying"
                  echo "$output"
                  sleep 5
                done

                echo "❌ ${step} failed after ${max_attempts} attempts"
                return 1
              }

              wait_for_query_readiness

              # Add all coordinators
              {{- range .Values.coordinators }}
              run_ddl_with_retries "ADD COORDINATOR {{ .id }}" 'ADD COORDINATOR {{ .id }} WITH CONFIG {"bolt_server": "memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.ports.boltPort }}", "management_server": "memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.ports.managementPort }}", "coordinator_server": "memgraph-coordinator-{{ .id }}.{{$.Release.Namespace }}.svc.cluster.local:{{ $.Values.ports.coordinatorPort }}"};'
              {{- end }}

              # Register all data instances
              {{- range $index, $instance := .Values.data }}
              run_ddl_with_retries "REGISTER INSTANCE instance_{{ add $index 1 }}" 'REGISTER INSTANCE instance_{{ add $index 1 }} WITH CONFIG {"bolt_server": "memgraph-data-{{ $instance.id }}.{{ $.Release.Namespace }}.svc.cluster.local:{{$.Values.ports.boltPort }}", "management_server": "memgraph-data-{{ $instance.id }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.ports.managementPort }}", "replication_server": "memgraph-data-{{ $instance.id }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.ports.replicationPort }}"};'
              {{- end }}

              # Set first data instance as MAIN
              run_ddl_with_retries "SET INSTANCE instance_1 TO MAIN" 'SET INSTANCE instance_1 TO MAIN;'

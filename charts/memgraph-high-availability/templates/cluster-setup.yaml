{{- $useSSL := ternary "--use-ssl" "" (index .Values.coordinators 0).tls.bolt.enabled }}

{{- include "memgraph.validateExternalAccess" . }}

{{/*
  When a tier is exposed through ingress-nginx or gateway with an external-dns
  hostname, its instances are reachable on that hostname at a per-instance port
  (dataPortBase + id / coordinatorPortBase + id), so the routing "bolt_server"
  registered with the coordinators must point to that external hostname:port.
  The management/coordinator/replication servers stay internal (intra-cluster).

  This is resolved PER TIER: data instances use the dataInstance tier's own
  service type + external-dns hostname, and coordinators use the coordinator
  tier's own — the two can differ (e.g. data via IngressNginx, coordinators via
  CommonLoadBalancer). Only IngressNginx/gateway give each instance a unique
  external port; CommonLoadBalancer shares one hostname:boltPort across all
  coordinators; LoadBalancer gives each instance its own LB Service, so its
  hostname is resolved PER INSTANCE from the instance's
  externalAccessAnnotations (merged with the tier annotations, per-instance
  winning — the same merge the external service templates apply) at the shared
  bolt port. NodePort keeps the internal bolt_server.
*/}}
{{/*
  Per instance the external port is either unique (IngressNginx / gateway give
  portBase + id) or a single shared port (CommonLoadBalancer puts every
  coordinator behind one bolt port; a per-instance LoadBalancer exposes its
  instance on the bolt port too). $*ExternalPort, when > 0, is that shared
  fixed port and takes precedence over $*ExternalPortBase + id in the loops below.
*/}}
{{- $dataExternalHost := "" }}
{{- $dataExternalPortBase := 0 }}
{{- $dataExternalPort := 0 }}
{{- $coordExternalHost := "" }}
{{- $coordExternalPortBase := 0 }}
{{- $coordExternalPort := 0 }}
{{/*
  IngressNginx tiers share ONE controller Service (one LB, one external-dns
  hostname); instances behind it are told apart by port, not host. So every
  IngressNginx tier uses the single hostname that lands on that Service — the
  merged dataInstance+coordinator annotations, coordinator winning on a key
  collision (same as memgraph.externalAccessAnnotations). Using a tier's own
  hostname here would register a bolt_server host with no DNS record.
*/}}
{{- $ingressHost := index (include "memgraph.externalAccessAnnotations" . | fromYaml) "external-dns.alpha.kubernetes.io/hostname" | default "" }}
{{- if eq .Values.externalAccessConfig.dataInstance.serviceType "IngressNginx" }}
  {{- $dataExternalHost = $ingressHost }}
  {{- $dataExternalPortBase = int .Values.externalAccessConfig.ingress.dataPortBase }}
{{- else if .Values.externalAccessConfig.gateway.enabled }}
  {{- $dataExternalHost = index (.Values.externalAccessConfig.gateway.annotations | default dict) "external-dns.alpha.kubernetes.io/hostname" | default "" }}
  {{- $dataExternalPortBase = int .Values.externalAccessConfig.gateway.dataPortBase }}
{{- end }}
{{- if eq .Values.externalAccessConfig.coordinator.serviceType "IngressNginx" }}
  {{- $coordExternalHost = $ingressHost }}
  {{- $coordExternalPortBase = int .Values.externalAccessConfig.ingress.coordinatorPortBase }}
{{- else if eq .Values.externalAccessConfig.coordinator.serviceType "CommonLoadBalancer" }}
  {{- /* Own dedicated LB for all coordinators on the bolt port; every
         coordinator is reached at the same hostname:boltPort. */}}
  {{- $coordExternalHost = index (.Values.externalAccessConfig.coordinator.annotations | default dict) "external-dns.alpha.kubernetes.io/hostname" | default "" }}
  {{- $coordExternalPort = int .Values.ports.boltPort }}
{{- else if .Values.externalAccessConfig.gateway.enabled }}
  {{- $coordExternalHost = index (.Values.externalAccessConfig.gateway.annotations | default dict) "external-dns.alpha.kubernetes.io/hostname" | default "" }}
  {{- $coordExternalPortBase = int .Values.externalAccessConfig.gateway.coordinatorPortBase }}
{{- end }}
{{/*
  LoadBalancer = one dedicated LB Service per instance, so the external-dns
  hostname is per instance, not per tier — it is read inside the registration
  loops below from the instance's externalAccessAnnotations merged with the
  tier annotations (per-instance wins, mirroring services-*-external.yaml).
  An instance without a hostname annotation keeps the internal bolt_server.
*/}}
{{- $dataPerInstanceLB := eq .Values.externalAccessConfig.dataInstance.serviceType "LoadBalancer" }}
{{- $coordPerInstanceLB := eq .Values.externalAccessConfig.coordinator.serviceType "LoadBalancer" }}

apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-setup
  annotations:
    # post-upgrade lets the job re-run on scale-out so newly added data instances
    # and coordinators get registered automatically (idempotent for existing ones).
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  {{- with .Values.clusterSetup.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  template:
    {{- with .Values.clusterSetup.labels }}
    metadata:
      labels:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    spec:
      restartPolicy: Never
      {{- with .Values.clusterSetup.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cluster-setup
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          {{- with .Values.clusterSetup.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -Eeuo pipefail

              echo "Waiting for Memgraph coordinators to be ready..."

              # Function to wait for a service to be ready
              wait_for_service() {
                local host=$1
                local port=$2
                local max_attempts=60
                local attempt=0

                while [ $attempt -lt $max_attempts ]; do
                  echo "Checking $host:$port (attempt $((attempt+1))/$max_attempts)"

                  if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$host/$port" 2>/dev/null; then
                    echo "✅ $host:$port is ready"
                    return 0
                  fi

                  attempt=$((attempt+1))
                  sleep 5
                done

                echo "❌ Timeout waiting for $host:$port"
                return 1
              }

              # Wait for all coordinators
              {{- range .Values.coordinators }}
              wait_for_service "memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}" {{ $.Values.ports.boltPort }}
              {{- end }}

              # Wait for all data instances
              {{- range .Values.data }}
              wait_for_service "memgraph-data-{{ .id }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}" {{ $.Values.ports.boltPort }}
              {{- end }}

              PRIMARY_COORD_HOST="memgraph-coordinator-{{ (index .Values.coordinators 0).id }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
              PRIMARY_COORD_PORT="{{ $.Values.ports.boltPort }}"

              run_mgconsole() {
                local query="$1"
                echo "$query" | mgconsole {{ $useSSL }} --host "$PRIMARY_COORD_HOST" --port "$PRIMARY_COORD_PORT" 2>&1
              }

              run_mgconsole_csv() {
                local query="$1"
                echo "$query" | mgconsole {{ $useSSL }} --host "$PRIMARY_COORD_HOST" --port "$PRIMARY_COORD_PORT" --output-format=csv 2>/dev/null
              }

              # Returns 0 if any instance currently has role "main", 1 if none do,
              # 2 if the "role" column could not be located in SHOW INSTANCES output.
              # Locates the column by its "role" header (survives column reordering)
              # and scans for the header row rather than assuming line 1, since
              # mgconsole may emit a banner / "N rows in set" trailer on stdout.
              # mgconsole CSV double-quotes every value ("""main"""), so unquote()
              # strips all double quotes, not just the outermost pair.
              cluster_has_main() {
                local output
                output="$(run_mgconsole_csv "SHOW INSTANCES;")" || return 2
                printf '%s\n' "$output" | awk -F',' '
                  function unquote(s) {
                    gsub(/^[ \t]+|[ \t]+$/, "", s)
                    gsub(/"/, "", s)
                    return tolower(s)
                  }
                  !have_header {
                    ri = 0
                    for (i = 1; i <= NF; i++) {
                      if (unquote($i) == "role") { ri = i }
                    }
                    if (ri > 0) { role_idx = ri; have_header = 1 }
                    next
                  }
                  unquote($role_idx) == "main" { found = 1 }
                  END {
                    if (!have_header) { exit 2 }
                    exit (found ? 0 : 1)
                  }
                '
              }

              # Echoes the currently-registered bolt_server for the row whose "name"
              # column equals the given target (an instance name like "instance_1"
              # or a coordinator name like "coordinator_1"). Prints nothing when the
              # row, the "name" column, or the "bolt_server" column can't be found,
              # so callers can safely skip reconciliation instead of acting on noise.
              # Columns are located by header (normalized, so "bolt_server" and
              # "bolt server" both match) rather than by a fixed position.
              get_registered_bolt_server() {
                local target="$1"
                local output
                output="$(run_mgconsole_csv "SHOW INSTANCES;")" || return 0
                printf '%s\n' "$output" | awk -F',' -v target="$target" '
                  # mgconsole CSV double-quotes every value ("""instance_1"""), so
                  # strip all double quotes rather than a single outer pair.
                  function unquote(s) {
                    gsub(/^[ \t]+|[ \t]+$/, "", s)
                    gsub(/"/, "", s)
                    return s
                  }
                  function norm(s) { s = unquote(s); gsub(/[^a-zA-Z0-9]/, "", s); return tolower(s) }
                  # Scan for the header row (has both name + bolt_server columns)
                  # instead of assuming line 1, since mgconsole may print a banner
                  # or a "N rows in set" trailer on stdout.
                  !have_header {
                    ni = 0; bi = 0
                    for (i = 1; i <= NF; i++) {
                      if (norm($i) == "name") { ni = i }
                      if (norm($i) == "boltserver") { bi = i }
                    }
                    if (ni > 0 && bi > 0) { name_idx = ni; bolt_idx = bi; have_header = 1 }
                    next
                  }
                  unquote($name_idx) == target { print unquote($bolt_idx); exit 0 }
                '
              }

              # Prints one "<name>\t<role>" line per registered coordinator/data
              # instance found in SHOW INSTANCES (role lower-cased). Rows whose name
              # isn't a coordinator_/instance_ managed by this chart (and the banner /
              # "N rows in set" trailer) are ignored. Prints nothing if the output
              # can't be parsed, so callers make no removal decisions on bad data.
              get_registered_instances() {
                local output
                output="$(run_mgconsole_csv "SHOW INSTANCES;")" || return 0
                printf '%s\n' "$output" | awk -F',' '
                  function unquote(s) { gsub(/^[ \t]+|[ \t]+$/, "", s); gsub(/"/, "", s); return s }
                  function norm(s) { s = unquote(s); gsub(/[^a-zA-Z0-9]/, "", s); return tolower(s) }
                  !have_header {
                    ni = 0; ri = 0
                    for (i = 1; i <= NF; i++) {
                      if (norm($i) == "name") { ni = i }
                      if (norm($i) == "role") { ri = i }
                    }
                    if (ni > 0 && ri > 0) { name_idx = ni; role_idx = ri; have_header = 1 }
                    next
                  }
                  {
                    n = unquote($name_idx)
                    if (n ~ /^coordinator_/ || n ~ /^instance_/) {
                      print n "\t" tolower(unquote($role_idx))
                    }
                  }
                '
              }

              # in_list <needle> <space-separated-list> -> 0 if present, else 1.
              in_list() {
                local needle="$1" item
                for item in $2; do
                  [ "$item" = "$needle" ] && return 0
                done
                return 1
              }

              # Reconciles a single instance's registered bolt_server with the value
              # this chart renders. Used to pick up external-dns hostname changes for
              # ingress/gateway (UPDATE CONFIG only supports bolt_server). Args:
              #   $1 target      - name in SHOW INSTANCES ("instance_1"/"coordinator_1")
              #   $2 subject      - UPDATE CONFIG subject ("INSTANCE instance_1"/"COORDINATOR 1")
              #   $3 desired      - desired bolt_server "host:port"
              reconcile_bolt_server() {
                local target="$1" subject="$2" desired="$3"
                local current
                current="$(get_registered_bolt_server "$target")"
                if [ -z "$current" ]; then
                  echo "ℹ️  Could not read current bolt_server for ${target}; skipping UPDATE CONFIG."
                elif [ "$current" = "$desired" ]; then
                  echo "✅ ${target} bolt_server already up to date (${desired})."
                else
                  echo "🔄 ${target} bolt_server changed (${current} -> ${desired}); updating."
                  run_ddl_with_retries "UPDATE CONFIG FOR ${subject}" "UPDATE CONFIG FOR ${subject} {'bolt_server': '${desired}'};"
                fi
              }

              wait_for_query_readiness() {
                local max_attempts=60
                local attempt=0

                while [ $attempt -lt $max_attempts ]; do
                  echo "Checking coordinator query readiness (attempt $((attempt+1))/$max_attempts)"
                  if run_mgconsole "SHOW INSTANCES;" >/dev/null; then
                    echo "✅ Coordinator query path is ready"
                    return 0
                  fi

                  attempt=$((attempt+1))
                  sleep 5
                done

                echo "❌ Timeout waiting for coordinator query readiness"
                return 1
              }

              run_ddl_with_retries() {
                local step="$1"
                local query="$2"
                local max_attempts=20
                local attempt=0

                while [ $attempt -lt $max_attempts ]; do
                  set +e
                  local output
                  output="$(run_mgconsole "$query")"
                  local status=$?
                  set -e

                  if [ "$status" -eq 0 ]; then
                    echo "✅ ${step} succeeded"
                    return 0
                  fi

                  local output_lc="${output,,}"

                  # Retry-safe handling for partially applied hook runs.
                  if [[ "$output_lc" == *"already exists"* ]] || \
                     [[ "$output_lc" == *"already set"* ]] || \
                     [[ "$output_lc" == *"already a main"* ]] || \
                     [[ "$output_lc" == *"is already main"* ]] || \
                     [[ "$output_lc" == *"request forwarded to the leader but leader failed with request processing"* ]]; then
                    return 0
                  fi

                  attempt=$((attempt+1))

                  # Keep retrying by default
                  echo "⏳ ${step} failed (attempt ${attempt}/${max_attempts}); retrying"
                  echo "$output"
                  sleep 5
                done

                echo "❌ ${step} failed after ${max_attempts} attempts"
                return 1
              }

              wait_for_query_readiness

              # Add all coordinators
              {{- range .Values.coordinators }}
              {{- $coordBoltServer := printf "memgraph-coordinator-%s.%s.svc.%s:%v" .id $.Release.Namespace $.Values.clusterDomain $.Values.ports.boltPort }}
              {{- if $coordExternalHost }}
              {{- if gt $coordExternalPort 0 }}
              {{- $coordBoltServer = printf "%s:%d" $coordExternalHost $coordExternalPort }}
              {{- else }}
              {{- $coordBoltServer = printf "%s:%d" $coordExternalHost (add $coordExternalPortBase (int .id)) }}
              {{- end }}
              {{- else if $coordPerInstanceLB }}
              {{- $coordLBAnnotations := mergeOverwrite (dict) ($.Values.externalAccessConfig.coordinator.annotations | default dict) (.externalAccessAnnotations | default dict) }}
              {{- with index $coordLBAnnotations "external-dns.alpha.kubernetes.io/hostname" }}
              {{- $coordBoltServer = printf "%s:%v" . $.Values.ports.boltPort }}
              {{- end }}
              {{- end }}
              run_ddl_with_retries "ADD COORDINATOR {{ .id }}" 'ADD COORDINATOR {{ .id }} WITH CONFIG {"bolt_server": "{{ $coordBoltServer }}", "management_server": "memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}:{{ $.Values.ports.managementPort }}", "coordinator_server": "memgraph-coordinator-{{ .id }}.{{$.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}:{{ $.Values.ports.coordinatorPort }}"};'
              # ADD COORDINATOR no-ops if already registered, so reconcile bolt_server
              # separately. $coordBoltServer is the external-dns host:port when
              # ingress/gateway/per-instance LoadBalancer is enabled, otherwise the
              # internal cluster address, so this both applies hostname changes and
              # reverts to internal when the external access is turned off.
              reconcile_bolt_server "coordinator_{{ .id }}" "COORDINATOR {{ .id }}" "{{ $coordBoltServer }}"
              {{- end }}

              # Register all data instances
              {{- range $index, $instance := .Values.data }}
              {{- $dataBoltServer := printf "memgraph-data-%s.%s.svc.%s:%v" $instance.id $.Release.Namespace $.Values.clusterDomain $.Values.ports.boltPort }}
              {{- if $dataExternalHost }}
              {{- if gt $dataExternalPort 0 }}
              {{- $dataBoltServer = printf "%s:%d" $dataExternalHost $dataExternalPort }}
              {{- else }}
              {{- $dataBoltServer = printf "%s:%d" $dataExternalHost (add $dataExternalPortBase (int $instance.id)) }}
              {{- end }}
              {{- else if $dataPerInstanceLB }}
              {{- $dataLBAnnotations := mergeOverwrite (dict) ($.Values.externalAccessConfig.dataInstance.annotations | default dict) ($instance.externalAccessAnnotations | default dict) }}
              {{- with index $dataLBAnnotations "external-dns.alpha.kubernetes.io/hostname" }}
              {{- $dataBoltServer = printf "%s:%v" . $.Values.ports.boltPort }}
              {{- end }}
              {{- end }}
              run_ddl_with_retries "REGISTER INSTANCE instance_{{ add (int $instance.id) 1 }}" 'REGISTER INSTANCE instance_{{ add (int $instance.id) 1 }} WITH CONFIG {"bolt_server": "{{ $dataBoltServer }}", "management_server": "memgraph-data-{{ $instance.id }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}:{{ $.Values.ports.managementPort }}", "replication_server": "memgraph-data-{{ $instance.id }}.{{ $.Release.Namespace }}.svc.{{ $.Values.clusterDomain }}:{{ $.Values.ports.replicationPort }}"};'
              # REGISTER INSTANCE no-ops if already registered, so reconcile bolt_server
              # separately. $dataBoltServer is the external-dns host:port when
              # ingress/gateway/per-instance LoadBalancer is enabled, otherwise the
              # internal cluster address, so this both applies hostname changes and
              # reverts to internal when the external access is turned off. The
              # instance name is keyed by the data
              # instance .id (name = instance_<id+1>), not array position, so removing a
              # middle entry leaves the other instances' names and endpoints untouched.
              # The +1 keeps names identical to the previous index-based scheme for the
              # default 0-based ids (instance_1, instance_2, ...), so upgrades are safe.
              reconcile_bolt_server "instance_{{ add (int $instance.id) 1 }}" "INSTANCE instance_{{ add (int $instance.id) 1 }}" "{{ $dataBoltServer }}"
              {{- end }}

              # Elect the first data instance as MAIN only on a fresh bootstrap.
              # We detect this at runtime (is there already a MAIN?) rather than via
              # .Release.IsInstall, because ArgoCD renders with `helm template`
              # (always IsInstall=true) and would otherwise re-assert MAIN on every
              # sync — disruptive after a failover promoted a different instance.
              set +e
              cluster_has_main
              has_main_status=$?
              set -e
              if [ "$has_main_status" -eq 0 ]; then
                echo "✅ A MAIN already exists; skipping initial MAIN election."
              elif [ "$has_main_status" -eq 1 ]; then
                run_ddl_with_retries "SET INSTANCE instance_{{ add (int (index .Values.data 0).id) 1 }} TO MAIN" 'SET INSTANCE instance_{{ add (int (index .Values.data 0).id) 1 }} TO MAIN;'
              else
                echo "⚠️  Could not locate the 'role' column in SHOW INSTANCES; attempting idempotent MAIN election."
                run_ddl_with_retries "SET INSTANCE instance_{{ add (int (index .Values.data 0).id) 1 }} TO MAIN" 'SET INSTANCE instance_{{ add (int (index .Values.data 0).id) 1 }} TO MAIN;'
              fi

              # Scale-down: remove coordinators / data instances that are registered
              # in the cluster but no longer present in the chart values.
              #
              # Desired sets are rendered from values. Both coordinators and data
              # instances are keyed by their stable .id (coordinator_<id> /
              # instance_<id+1>), so an instance's name is bound to its pod. That makes
              # removal position-independent: dropping a middle entry unregisters
              # exactly that instance and leaves the others' names/endpoints intact.
              #
              # Safety: we never remove the current MAIN data instance or the leader
              # coordinator (the docs forbid it). When a pod is deleted on scale-down,
              # the cluster fails over / re-elects, so on a later sync the removed
              # member is no longer MAIN/leader and is cleaned up then — self-healing.
              DESIRED_COORDINATORS="{{- range $.Values.coordinators }} coordinator_{{ .id }}{{- end }}"
              DESIRED_INSTANCES="{{- range $.Values.data }} instance_{{ add (int .id) 1 }}{{- end }}"

              echo "Reconciling cluster membership (removing instances no longer in values)..."
              while IFS="$(printf '\t')" read -r reg_name reg_role; do
                if [ -z "$reg_name" ]; then continue; fi
                case "$reg_name" in
                  coordinator_*)
                    if ! in_list "$reg_name" "$DESIRED_COORDINATORS"; then
                      if [ "$reg_role" = "leader" ]; then
                        echo "⚠️  ${reg_name} is no longer in values but is the current leader; cannot remove the leader. It will be removed on a later sync once leadership changes."
                      else
                        run_ddl_with_retries "REMOVE COORDINATOR ${reg_name#coordinator_}" "REMOVE COORDINATOR ${reg_name#coordinator_};"
                      fi
                    fi
                    ;;
                  instance_*)
                    if ! in_list "$reg_name" "$DESIRED_INSTANCES"; then
                      if [ "$reg_role" = "main" ]; then
                        echo "⚠️  ${reg_name} is no longer in values but is the current MAIN; unregistering a MAIN can corrupt cluster state, so skipping. It will be removed on a later sync once a failover promotes another instance."
                      else
                        run_ddl_with_retries "UNREGISTER INSTANCE ${reg_name}" "UNREGISTER INSTANCE ${reg_name};"
                      fi
                    fi
                    ;;
                esac
              done < <(get_registered_instances)

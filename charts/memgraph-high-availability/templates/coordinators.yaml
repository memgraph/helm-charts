{{- range $index, $coordinator := .Values.coordinators }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memgraph-coordinator-{{ $coordinator.id }}
  labels:
    {{- with $.Values.labels.coordinators.statefulSetLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:
  serviceName: "memgraph-coordinator-{{ $coordinator.id }}"
  replicas: 1
  selector:
    matchLabels:
      app: memgraph-coordinator-{{ $coordinator.id }}
      role: coordinator
  {{- with $.Values.updateStrategy }}
  updateStrategy:
  {{ toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: memgraph-coordinator-{{ $coordinator.id }}
        role: coordinator
        {{- with $.Values.labels.coordinators.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ $.Values.container.coordinators.terminationGracePeriodSeconds }}
      securityContext:
        runAsUser: {{ $.Values.memgraphUserId }}
        runAsGroup: {{ $.Values.memgraphGroupId }}
        fsGroup: {{ $.Values.memgraphGroupId }}
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with $.Values.tolerations.coordinators }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if $.Values.affinity.nodeSelection }}
        # Node Selection Affinity: Scheduled on nodes with specific label key and value
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ $.Values.affinity.roleLabelKey }}
                operator: In
                values:
                - {{ $.Values.affinity.coordinatorNodeLabelValue | quote }}
        podAntiAffinity :
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - coordinator
            topologyKey: "kubernetes.io/hostname"
        {{- else if $.Values.affinity.unique }}
        # Unique Affinity: Schedule pods on different nodes
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - coordinator
                - data
            topologyKey: "kubernetes.io/hostname"
        {{- else if $.Values.affinity.parity }}
        # Parity Affinity: One coordinator and one data node per node, coordinator schedules first, needs to be in pairs
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - coordinator
            topologyKey: "kubernetes.io/hostname"
        {{- else }}
        # Default Affinity: Avoid scheduling on the same node
        podAntiAffinity:
           preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: role
                      operator: In
                      values:
                        - coordinator
                topologyKey: "kubernetes.io/hostname"
        {{- end }}
      initContainers:
      {{- if $.Values.sysctlInitContainer.enabled }}
      - name: init-sysctl
        image: "{{ $.Values.sysctlInitContainer.image.repository }}:{{ $.Values.sysctlInitContainer.image.tag }}"
        imagePullPolicy: {{ $.Values.sysctlInitContainer.image.pullPolicy }}
        command: ['sh', '-c', 'sysctl -w vm.max_map_count={{ int64 $.Values.sysctlInitContainer.maxMapCount }}']
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
      {{- end }}

      {{- if $.Values.storage.coordinators.createCoreDumpsClaim }}
      - name: init-core-dumps
        image: "{{ $.Values.storage.coordinators.coreDumpsImage.repository }}:{{ $.Values.storage.coordinators.coreDumpsImage.tag }}"
        imagePullPolicy: {{ $.Values.storage.coordinators.coreDumpsImage.pullPolicy }}
        command: ['/bin/sh', '-c']
        args:
          - >
            echo '{{ $.Values.storage.coordinators.coreDumpsMountPath }}/core.%e.%p.%t.%s' | tee /proc/sys/kernel/core_pattern;
            if [ -d /proc/sys/kernel/yama ]; then echo '0' | tee /proc/sys/kernel/yama/ptrace_scope; fi
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
      {{- end }}

      {{- with $.Values.initContainers.coordinators }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

      containers:
      - name: memgraph-coordinator
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        ports:
        - containerPort: {{ $.Values.ports.boltPort }}
        - containerPort: {{ $.Values.ports.managementPort }}
        - containerPort: {{ $.Values.ports.coordinatorPort }}
        {{- if $.Values.vectorRemote.enabled }}
        - containerPort: {{ $.Values.vectorRemote.websocketPort }}
          name: monitoring
        {{- end }}
        args:
        {{- range $arg := $coordinator.args }}
          {{- if hasPrefix "--bolt-port" $arg }}
            {{- fail (printf "Do not set --bolt-port in coordinators[id=%s].args; configure ports.boltPort instead (auto-appended to args)." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--management-port" $arg }}
            {{- fail (printf "Do not set --management-port in coordinators[id=%s].args; configure ports.managementPort instead (auto-appended to args)." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--coordinator-port" $arg }}
            {{- fail (printf "Do not set --coordinator-port in coordinators[id=%s].args; configure ports.coordinatorPort instead (auto-appended to args)." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--coordinator-id" $arg }}
            {{- fail (printf "Do not set --coordinator-id in coordinators[id=%s].args; the instance's id field is auto-appended as --coordinator-id." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--coordinator-hostname" $arg }}
            {{- fail (printf "Do not set --coordinator-hostname in coordinators[id=%s].args; it is auto-appended from the StatefulSet/Service name and release namespace." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--data-directory" $arg }}
            {{- fail (printf "Do not set --data-directory in coordinators[id=%s].args; it is auto-appended (/var/lib/memgraph/mg_data)." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--log-level" $arg }}
            {{- fail (printf "Do not set --log-level in coordinators[id=%s].args; configure commonArgs.logging.log_level instead." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--also-log-to-stderr" $arg }}
            {{- fail (printf "Do not set --also-log-to-stderr in coordinators[id=%s].args; configure commonArgs.logging.also_log_to_stderr instead." $coordinator.id) }}
          {{- end }}
          {{- if hasPrefix "--log-file" $arg }}
            {{- fail (printf "Do not set --log-file in coordinators[id=%s].args; configure commonArgs.logging.log_file instead." $coordinator.id) }}
          {{- end }}
        {{- end }}
        {{- range $arg := $coordinator.args }}
        - "{{ $arg }}"
        {{- end }}
        - "--bolt-port={{ $.Values.ports.boltPort }}"
        - "--management-port={{ $.Values.ports.managementPort }}"
        - "--coordinator-port={{ $.Values.ports.coordinatorPort }}"
        - "--coordinator-id={{ $coordinator.id }}"
        - "--coordinator-hostname=memgraph-coordinator-{{ $coordinator.id }}.{{ $.Release.Namespace }}.svc.cluster.local"
        - "--data-directory=/var/lib/memgraph/mg_data"
        {{- include "memgraph.commonLoggingArgs" $ | nindent 8 }}
        env:
          - name: MEMGRAPH_ENTERPRISE_LICENSE
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.secrets.name }}
                key: {{ $.Values.secrets.licenseKey }}
          - name: MEMGRAPH_ORGANIZATION_NAME
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.secrets.name }}
                key: {{ $.Values.secrets.organizationKey }}
          - name: DGL_DOWNLOAD_DIR # DGL by default writes to /home/memgraph which we set to be read-only
            value: /tmp/.dgl
          - name: DGLDEFAULTDIR # DGL by default writes to /home/memgraph which we set to be read-only
            value: /tmp/.dgl
          - name: MGCONSOLE_HISTORY_PATH # mgconsole by default writes to /home/memgraph/.memgraph which we set to be read-only
            value: /tmp/.memgraph
          {{- with $.Values.extraEnv.coordinators }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        volumeMounts:
          - name: memgraph-coordinator-{{ $coordinator.id }}-lib-storage
            mountPath: /var/lib/memgraph
          - name: memgraph-coordinator-{{ $coordinator.id }}-log-storage
            mountPath: /var/log/memgraph
          - name: memgraph-coordinator-{{ $coordinator.id }}-tmp # Some Python libs require writing to tmp folder. Root filesystem set to read-only.
            mountPath: /tmp
          {{- if $.Values.storage.coordinators.createCoreDumpsClaim }}
          - name: memgraph-coordinator-{{ $coordinator.id }}-core-dumps-storage
            mountPath: {{ $.Values.storage.coordinators.coreDumpsMountPath }}
          {{- end }}
          {{- with $.Values.storage.coordinators.extraVolumeMounts }}
          {{- toYaml . | nindent 10 }}
          {{- end }}

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ "ALL" ]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          # Run by 'memgraph' user as specified in the Dockerfile
        {{- include "container.coordinators.readinessProbe" $.Values.container.coordinators.readinessProbe | nindent 8 }}
        {{- include "container.coordinators.livenessProbe" $.Values.container.coordinators.livenessProbe | nindent 8 }}
        {{- include "container.coordinators.startupProbe" $.Values.container.coordinators.startupProbe | nindent 8 }}
        {{- with $.Values.resources.coordinators }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- if and $.Values.coreDumpUploader.enabled $.Values.storage.coordinators.createCoreDumpsClaim }}
      {{- include "memgraph.coreDumpUploader" (dict "volumeName" (printf "memgraph-coordinator-%s-core-dumps-storage" $coordinator.id) "mountPath" $.Values.storage.coordinators.coreDumpsMountPath "values" $.Values.coreDumpUploader) | nindent 6 }}
      {{- end }}
      {{- if and $.Values.vectorRemote.enabled $.Values.vectorRemote.coordinators }}
      {{- include "memgraph.vectorSidecar" (dict "ctx" $ "role" "coordinator") | nindent 6 }}
      {{- end }}
      {{- with $.Values.userContainers.coordinators }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

      volumes:
      - name: memgraph-coordinator-{{ $coordinator.id }}-tmp
        emptyDir: {}
      {{- if $.Values.storage.coordinators.extraVolumes }}
      {{- tpl (toYaml $.Values.storage.coordinators.extraVolumes) $ | nindent 6 }}
      {{- end }}

  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-coordinator-{{ $coordinator.id }}-lib-storage
      spec:
        accessModes:
        - {{ $.Values.storage.coordinators.libStorageAccessMode }}
        storageClassName: {{ $.Values.storage.coordinators.libStorageClassName }}
        {{- if $coordinator.restoreDataFromSnapshot }}
        dataSource:
          name: {{ $coordinator.volumeSnapshotName }}
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.storage.coordinators.libPVCSize }}

    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-coordinator-{{ $coordinator.id }}-log-storage
      spec:
        accessModes:
        - {{ $.Values.storage.coordinators.logStorageAccessMode }}
        storageClassName: {{ $.Values.storage.coordinators.logStorageClassName }}
        resources:
          requests:
            storage: {{ $.Values.storage.coordinators.logPVCSize }}

    {{- if $.Values.storage.coordinators.createCoreDumpsClaim }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-coordinator-{{ $coordinator.id }}-core-dumps-storage
      spec:
        accessModes:
        - "ReadWriteOnce"
        {{- if $.Values.storage.coordinators.coreDumpsStorageClassName }}
        storageClassName: {{ $.Values.storage.coordinators.coreDumpsStorageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.storage.coordinators.coreDumpsStorageSize }}
    {{- end }}
---
{{- end }}

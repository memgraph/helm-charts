{{- if $.Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mg-exporter-config
  namespace: {{ $.Values.prometheus.namespace | default $.Release.Namespace }}
data:
  ha_config.yaml: |
    exporter:
      port: {{ $.Values.prometheus.memgraphExporter.port }}
      pull_frequency_seconds: {{ $.Values.prometheus.memgraphExporter.pullFrequencySeconds }}
    instances:
      {{- $exporterTls := $.Values.prometheus.memgraphExporter.tls }}
      {{- $caFile := "" }}
      {{- if and (not $exporterTls.skipVerify) $exporterTls.caSecretName }}
      {{- $caFile = printf "/etc/mg-exporter/ssl/%s" $exporterTls.caSecretKey }}
      {{- end }}
      {{- range $.Values.coordinators }}
      - name: coord{{ .id }}
        url: {{ if .tls.bolt.enabled }}https{{ else }}http{{ end }}://memgraph-coordinator-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local
        port: {{ $.Values.ports.metricsPort }}
        type: coordinator
        {{- if .tls.bolt.enabled }}
        skip_tls_verify: {{ $exporterTls.skipVerify }}
        {{- if $caFile }}
        ca_file: {{ $caFile | quote }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- range $.Values.data }}
      - name: data{{ .id }}
        url: {{ if .tls.bolt.enabled }}https{{ else }}http{{ end }}://memgraph-data-{{ .id }}.{{ $.Release.Namespace }}.svc.cluster.local
        port: {{ $.Values.ports.metricsPort }}
        type: data_instance
        {{- if .tls.bolt.enabled }}
        skip_tls_verify: {{ $exporterTls.skipVerify }}
        {{- if $caFile }}
        ca_file: {{ $caFile | quote }}
        {{- end }}
        {{- end }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mg-exporter
  namespace: {{ $.Values.prometheus.namespace | default $.Release.Namespace }}
  labels:
    app: mg-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mg-exporter
  template:
    metadata:
      # Force Deployment rollout when HA exporter inputs change. The exporter
      # reads a ConfigMap via subPath, which doesn't refresh in-place.
      annotations:
        checksum/ha-config: {{ printf "%s-%s-%s" (toJson $.Values.coordinators) (toJson $.Values.data) (toJson $.Values.prometheus.memgraphExporter) | sha256sum }}
      labels:
        app: mg-exporter
    spec:
      containers:
        - name: exporter
          image: {{ $.Values.prometheus.memgraphExporter.repository }}:{{ $.Values.prometheus.memgraphExporter.tag }}
          volumeMounts:
            - name: config-volume
              mountPath: /etc/mg-exporter/ha_config.yaml
              subPath: ha_config.yaml
            {{- if and (not $.Values.prometheus.memgraphExporter.tls.skipVerify) $.Values.prometheus.memgraphExporter.tls.caSecretName }}
            - name: ca-bundle
              mountPath: /etc/mg-exporter/ssl
              readOnly: true
            {{- end }}
            {{- with $.Values.prometheus.memgraphExporter.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ $.Values.prometheus.memgraphExporter.port }}
          env:
            - name: DEPLOYMENT_TYPE
              value: HA  # HA stands for high availability
            - name: CONFIG_FILE
              value: /etc/mg-exporter/ha_config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: mg-exporter-config
        {{- if and (not $.Values.prometheus.memgraphExporter.tls.skipVerify) $.Values.prometheus.memgraphExporter.tls.caSecretName }}
        - name: ca-bundle
          secret:
            secretName: {{ $.Values.prometheus.memgraphExporter.tls.caSecretName }}
        {{- end }}
        {{- with $.Values.prometheus.memgraphExporter.extraVolumes }}
        {{- toYaml $.Values.prometheus.memgraphExporter.extraVolumes | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mg-exporter
  namespace: {{ $.Values.prometheus.namespace | default $.Release.Namespace }}
  labels:
    app: mg-exporter
spec:
  selector:
    app: mg-exporter
  ports:
    - protocol: TCP
      name: tcp-metrics-port
      port: {{ $.Values.prometheus.memgraphExporter.port }}
      targetPort: {{ $.Values.prometheus.memgraphExporter.port }}
---
{{- if and $.Values.prometheus.serviceMonitor.enabled (not $.Values.scrapeMemgraphDirectly) }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mg-exporter
  namespace: {{ $.Values.prometheus.namespace | default $.Release.Namespace }}
  labels:
    release: {{ $.Values.prometheus.serviceMonitor.kubePrometheusStackReleaseName }}
spec:
  selector:
    matchLabels:
      app: mg-exporter
  endpoints:
    - port: tcp-metrics-port  # must be the same as the service port name
      interval: {{ $.Values.prometheus.serviceMonitor.interval }}
  namespaceSelector:
    matchNames:
      - {{ $.Values.prometheus.namespace | default $.Release.Namespace }} # This refers to where our service exposing the exporter is located
{{- end }}
{{- end }}

{{- range $index, $data := .Values.data }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: memgraph-data-{{ $data.id }}
  labels:
    {{- with $.Values.labels.data.statefulSetLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  serviceName: "memgraph-data-{{ $data.id }}"
  replicas: 1
  selector:
    matchLabels:
      app: memgraph-data-{{ $data.id }}
      role: data
  {{- with $.Values.updateStrategy }}
  updateStrategy:
  {{ toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: memgraph-data-{{ $data.id }}
        role: data
        {{- with $.Values.labels.data.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ $.Values.container.data.terminationGracePeriodSeconds }}
      securityContext:
        runAsUser: {{ $.Values.memgraphUserId }}
        runAsGroup: {{ $.Values.memgraphGroupId }}
        fsGroup: {{ $.Values.memgraphGroupId }}
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with $.Values.tolerations.data }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if $.Values.affinity.nodeSelection }}
        # Node Selection Affinity: Scheduled on nodes with specific label key and value
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ $.Values.affinity.roleLabelKey }}
                operator: In
                values:
                - {{ $.Values.affinity.dataNodeLabelValue | quote }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - data
            topologyKey: "kubernetes.io/hostname"
        {{- else if $.Values.affinity.unique }}
        # Unique Affinity: Schedule pods on different nodes where there is no coordinator or data pod
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - coordinator
                - data
            topologyKey: "kubernetes.io/hostname"
        {{- else if $.Values.affinity.parity }}
        # Parity Affinity: One coordinator and one data node per node, coordinator schedules first, needs to be in pairs
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - coordinator
              topologyKey: "kubernetes.io/hostname"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: role
                operator: In
                values:
                - data
            topologyKey: "kubernetes.io/hostname"
        {{- else }}
        # Default Affinity: Avoid scheduling on the same node
        podAntiAffinity:
           preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: role
                      operator: In
                      values:
                        - data
                topologyKey: "kubernetes.io/hostname"
        {{- end }}

      initContainers:
      {{- if $.Values.sysctlInitContainer.enabled }}
      - name: init-sysctl
        image: "{{ $.Values.sysctlInitContainer.image.repository }}:{{ $.Values.sysctlInitContainer.image.tag }}"
        imagePullPolicy: {{ $.Values.sysctlInitContainer.image.pullPolicy }}
        command: ['sh', '-c', 'sysctl -w vm.max_map_count={{ int64 $.Values.sysctlInitContainer.maxMapCount }}']
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
      {{- end }}

      {{- if $.Values.storage.data.createCoreDumpsClaim }}
      - name: init-core-dumps
        image: "{{ $.Values.storage.data.coreDumpsImage.repository }}:{{ $.Values.storage.data.coreDumpsImage.tag }}"
        imagePullPolicy: {{ $.Values.storage.data.coreDumpsImage.pullPolicy }}
        command: ['/bin/sh', '-c']
        args:
          - >
            echo '{{ $.Values.storage.data.coreDumpsMountPath }}/core.%e.%p.%t.%s' | tee /proc/sys/kernel/core_pattern;
            if [ -d /proc/sys/kernel/yama ]; then echo '0' | tee /proc/sys/kernel/yama/ptrace_scope; fi
        securityContext:
          privileged: true
          runAsUser: 0
          runAsNonRoot: false
      {{- end }}

      {{- with $.Values.initContainers.data }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

      containers:
      - name: memgraph-data
        image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
        imagePullPolicy: {{ $.Values.image.pullPolicy }}
        ports:
        - containerPort: {{ $.Values.ports.boltPort }}
        - containerPort: {{ $.Values.ports.managementPort }}
        - containerPort: {{ $.Values.ports.replicationPort }}
        {{- if $.Values.vectorRemote.enabled }}
        - containerPort: {{ $.Values.vectorRemote.websocketPort }}
          name: monitoring
        {{- end }}
        args:
        {{- range $arg := $data.args }}
          {{- if hasPrefix "--bolt-port" $arg }}
            {{- fail (printf "Do not set --bolt-port in data[id=%s].args; configure ports.boltPort instead (auto-appended to args)." $data.id) }}
          {{- end }}
          {{- if hasPrefix "--management-port" $arg }}
            {{- fail (printf "Do not set --management-port in data[id=%s].args; configure ports.managementPort instead (auto-appended to args)." $data.id) }}
          {{- end }}
          {{- if hasPrefix "--data-directory" $arg }}
            {{- fail (printf "Do not set --data-directory in data[id=%s].args; it is auto-appended (/var/lib/memgraph/mg_data)." $data.id) }}
          {{- end }}
          {{- if hasPrefix "--log-level" $arg }}
            {{- fail (printf "Do not set --log-level in data[id=%s].args; configure commonArgs.logging.log_level instead." $data.id) }}
          {{- end }}
          {{- if hasPrefix "--also-log-to-stderr" $arg }}
            {{- fail (printf "Do not set --also-log-to-stderr in data[id=%s].args; configure commonArgs.logging.also_log_to_stderr instead." $data.id) }}
          {{- end }}
          {{- if hasPrefix "--log-file" $arg }}
            {{- fail (printf "Do not set --log-file in data[id=%s].args; configure commonArgs.logging.log_file instead." $data.id) }}
          {{- end }}
        {{- end }}
        {{- range $arg := $data.args }}
        - "{{ $arg }}"
        {{- end }}
        - "--bolt-port={{ $.Values.ports.boltPort }}"
        - "--management-port={{ $.Values.ports.managementPort }}"
        - "--data-directory=/var/lib/memgraph/mg_data"
        {{- include "memgraph.commonLoggingArgs" $ | nindent 8 }}
        env:
          - name: MEMGRAPH_ENTERPRISE_LICENSE
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.secrets.name }}
                key: {{ $.Values.secrets.licenseKey }}
          - name: MEMGRAPH_ORGANIZATION_NAME
            valueFrom:
              secretKeyRef:
                name: {{ $.Values.secrets.name }}
                key: {{ $.Values.secrets.organizationKey }}
          - name: DGL_DOWNLOAD_DIR # DGL by default writes to /home/memgraph which we set to be read-only
            value: /tmp/.dgl
          - name: DGLDEFAULTDIR # DGL by default writes to /home/memgraph which we set to be read-only
            value: /tmp/.dgl
          - name: MGCONSOLE_HISTORY_PATH # mgconsole by default writes to /home/memgraph/.memgraph which we set to be read-only
            value: /tmp/.memgraph
          {{- with $.Values.extraEnv.data }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        volumeMounts:
          - name: memgraph-data-{{ $data.id }}-lib-storage
            mountPath: /var/lib/memgraph
          - name: memgraph-data-{{ $data.id }}-log-storage
            mountPath: /var/log/memgraph
          - name: memgraph-data-{{ $data.id }}-tmp # Some Python libs require writing to tmp folder. Root filesystem set to read-only.
            mountPath: /tmp
          {{- if $.Values.storage.data.createCoreDumpsClaim }}
          - name: memgraph-data-{{ $data.id }}-core-dumps-storage
            mountPath: {{ $.Values.storage.data.coreDumpsMountPath }}
          {{- end }}
          {{- with $.Values.storage.data.extraVolumeMounts }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ "ALL" ]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          # Run by 'memgraph' user as specified in the Dockerfile
        {{- include "container.data.readinessProbe" $.Values.container.data.readinessProbe | nindent 8 }}
        {{- include "container.data.livenessProbe" $.Values.container.data.livenessProbe | nindent 8 }}
        {{- include "container.data.startupProbe" $.Values.container.data.startupProbe | nindent 8 }}
        {{- with $.Values.resources.data }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- if and $.Values.coreDumpUploader.enabled $.Values.storage.data.createCoreDumpsClaim }}
      {{- include "memgraph.coreDumpUploader" (dict "volumeName" (printf "memgraph-data-%s-core-dumps-storage" $data.id) "mountPath" $.Values.storage.data.coreDumpsMountPath "values" $.Values.coreDumpUploader) | nindent 6 }}
      {{- end }}
      {{- if and $.Values.vectorRemote.enabled $.Values.vectorRemote.data }}
      {{- include "memgraph.vectorSidecar" (dict "ctx" $ "role" "data") | nindent 6 }}
      {{- end }}
      {{- with $.Values.userContainers.data }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

      volumes:
      - name: memgraph-data-{{ $data.id }}-tmp
        emptyDir: {}
      {{- if $.Values.storage.data.extraVolumes }}
      {{- tpl (toYaml $.Values.storage.data.extraVolumes) $ | nindent 6 }}
      {{- end }}

  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-data-{{ $data.id }}-lib-storage
      spec:
        accessModes:
        - {{ $.Values.storage.data.libStorageAccessMode }}
        storageClassName: {{ $.Values.storage.data.libStorageClassName }}
        {{- if $data.restoreDataFromSnapshot }}
        dataSource:
          name: {{ $data.volumeSnapshotName }}
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.storage.data.libPVCSize }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-data-{{ $data.id }}-log-storage
      spec:
        accessModes:
        - {{ $.Values.storage.data.logStorageAccessMode }}
        storageClassName: {{ $.Values.storage.data.logStorageClassName }}
        resources:
          requests:
            storage: {{ $.Values.storage.data.logPVCSize }}

    {{- if $.Values.storage.data.createCoreDumpsClaim }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: memgraph-data-{{ $data.id }}-core-dumps-storage
      spec:
        accessModes:
        - "ReadWriteOnce"
        {{- if $.Values.storage.data.coreDumpsStorageClassName }}
        storageClassName: {{ $.Values.storage.data.coreDumpsStorageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.storage.data.coreDumpsStorageSize }}
    {{- end }}
---
{{- end }}

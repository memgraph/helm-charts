{{- $validDataServices := list "" "LoadBalancer" "NodePort" }}
{{- if not (has .Values.externalAccessConfig.dataInstance.serviceType $validDataServices) }}
  {{- fail "Invalid value for externalAccessConfig.dataInstance.serviceType. Use '', 'LoadBalancer', or 'NodePort'. To expose data instances via ingress-nginx, set externalAccessConfig.ingress.enabled: true instead." }}
{{- end }}

{{- if eq $.Values.externalAccessConfig.dataInstance.serviceType "" }}
  {{- /* No external service rendered for empty string */}}
{{- else }}
  {{- range .Values.data }}
---
apiVersion: v1
kind: Service
metadata:
  name: memgraph-data-{{ .id }}-external
  {{- $merged := merge (default dict .externalAccessAnnotations) (default dict $.Values.externalAccessConfig.dataInstance.annotations) }}
  {{- with $merged }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- with $.Values.labels.data.serviceLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if eq $.Values.externalAccessConfig.dataInstance.serviceType "NodePort" }}
  type: NodePort
  {{- else if eq $.Values.externalAccessConfig.dataInstance.serviceType "LoadBalancer" }}
  type: LoadBalancer
  {{- end }}
  selector:
    app: memgraph-data-{{ .id }}
  ports:
    - protocol: TCP
      name: tcp-bolt-port
      port: {{ $.Values.ports.boltPort }}
      targetPort: {{ $.Values.ports.boltPort }}
  {{- end }}
{{- end }}

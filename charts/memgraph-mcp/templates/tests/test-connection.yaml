apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "memgraph-mcp.fullname" . }}-test-connection"
  labels:
    {{- include "memgraph-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: docker.io/library/busybox:latest
      # MCP streamable-http requires Accept: application/json, text/event-stream
      # and rejects HEAD on /mcp, so we accept any HTTP status as proof the server is up.
      command: ['sh', '-c']
      args:
        - |
          wget -S --spider --tries=10 --timeout=5 \
               --header='Accept: application/json, text/event-stream' \
               'http://{{ include "memgraph-mcp.fullname" . }}:{{ .Values.service.port }}/mcp' 2>&1 \
               | tee /dev/stderr | grep -q 'HTTP/'

apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "memgraph-mcp.fullname" . }}-test-connection"
  labels:
    {{- include "memgraph-mcp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: docker.io/library/busybox:latest
      command: ['wget'] # Tests just if the server is listening, no 200 responses are allowed
      args:
        - '--spider'
        - '--tries=10'
        - '--timeout=5'
        - '{{ include "memgraph-mcp.fullname" . }}:{{ .Values.service.port }}/mcp'

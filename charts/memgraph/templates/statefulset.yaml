# templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memgraph.fullname" . }}
  labels:
    {{- include "memgraph.labels" . | nindent 4 }}
  {{- with .Values.statefulSetAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "memgraph.fullname" . }}
  selector:
    matchLabels:
      {{- include "memgraph.selectorLabels" . | nindent 6 }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "memgraph.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 4 }}
      {{- end }}
    spec:
      securityContext:
        runAsUser: {{ .Values.memgraphUserId }}
        runAsGroup: {{ .Values.memgraphGroupId }}
        fsGroup: {{ .Values.memgraphGroupId }}
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.serviceAccount.create }}
      serviceAccount: {{ include "memgraph.serviceAccountName" . }}
      {{- else if .Values.serviceAccount.name }}
      serviceAccount: {{ .Values.serviceAccount.name | quote }}
      {{- end }}
      initContainers:
        {{- if .Values.sysctlInitContainer.enabled }}
        - name: init-sysctl
          image: "{{ .Values.sysctlInitContainer.image.repository }}:{{ .Values.sysctlInitContainer.image.tag }}"
          imagePullPolicy: {{ .Values.sysctlInitContainer.image.pullPolicy }}
          command: ['sh', '-c', 'sysctl -w vm.max_map_count={{ int64 .Values.sysctlInitContainer.maxMapCount }}']
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
        {{- end }}

        {{- if .Values.persistentVolumeClaim.createCoreDumpsClaim }}
        - name: init-core-dumps
          image: docker.io/library/busybox:latest
          command: ['/bin/sh', '-c']
          args:
            - >
              echo '{{ .Values.persistentVolumeClaim.coreDumpsMountPath }}/core.%e.%p.%t.%s' | tee /proc/sys/kernel/core_pattern;
              if [ -d /proc/sys/kernel/yama ]; then echo '0' | tee /proc/sys/kernel/yama/ptrace_scope; fi
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
        {{- end }}

        {{- if and .Values.remoteCoreDumpUploader.enabled .Values.persistentVolumeClaim.createCoreDumpsClaim }}
        {{- $srcRepo := .Values.remoteCoreDumpUploader.binarySourceImage.repository | default .Values.image.repository }}
        {{- $srcTag := .Values.remoteCoreDumpUploader.binarySourceImage.tag | default (.Values.image.tag | default .Chart.AppVersion) }}
        - name: init-copy-memgraph-binary
          image: "{{ $srcRepo }}:{{ $srcTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['/bin/sh', '-c']
          args:
            - |
              set -eu
              # Populate a fake sysroot at /symbols so gdb can resolve every
              # absolute path the core file references via `set sysroot`.
              mkdir -p /symbols/usr/lib/memgraph
              mkdir -p /symbols/usr/lib/x86_64-linux-gnu
              cp -a /usr/lib/memgraph/. /symbols/usr/lib/memgraph/
              for f in /usr/lib/x86_64-linux-gnu/libpython3.12.so*; do
                [ -e "$f" ] || continue
                cp -a "$f" /symbols/usr/lib/x86_64-linux-gnu/
              done
              {{- if .Values.remoteCoreDumpUploader.copyPythonSitePackages }}
              mkdir -p /symbols/home/memgraph/.local/lib
              if [ -d /home/memgraph/.local/lib/python3.12 ]; then
                cp -a /home/memgraph/.local/lib/python3.12 /symbols/home/memgraph/.local/lib/
              fi
              {{- end }}
              # cp -a preserves source perms; only scope the readability
              # widen to files we just created (not the root mountpoint,
              # which is owned by root and would EPERM).
              find /symbols -mindepth 1 -exec chmod a+rX {} +
          volumeMounts:
            - name: {{ include "memgraph.fullname" . }}-remote-uploader-binary
              mountPath: /symbols
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        {{- end }}

        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      terminationGracePeriodSeconds: {{ .Values.container.terminationGracePeriodSeconds }}
      {{- if .Values.useImagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 4 }}
      {{- end }}
      volumes:
      {{- if not .Values.persistentVolumeClaim.createStorageClaim }}
        - name: {{ include "memgraph.fullname" . }}-lib-storage
        {{- if .Values.persistentVolumeClaim.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistentVolumeClaim.existingClaim }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- range .Values.customQueryModules }}
        - name: {{ .volume | quote }}
          configMap:
            name: {{ .volume | quote }}
      {{- end }}
      {{- if .Values.extraVolumes }}
      {{- tpl (toYaml .Values.extraVolumes) . | nindent 8 }}
      {{- end }}
      {{- if and .Values.remoteCoreDumpUploader.enabled .Values.persistentVolumeClaim.createCoreDumpsClaim }}
        - name: {{ include "memgraph.fullname" . }}-remote-uploader-binary
          emptyDir: {}
      {{- end }}

      containers:
        - name: memgraph
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
          {{- range .Values.memgraphConfig }}
          - {{ . | quote }}
          {{- end }}
          {{- if not .Values.persistentVolumeClaim.createLogStorage }}
          - "--log-file="
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: bolt
              containerPort: {{ .Values.service.boltPort }}
            - name: websocket
              containerPort: {{ .Values.service.websocketPortMonitoring }}
            - name: http
              containerPort: {{ .Values.service.httpPortMonitoring }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ "ALL" ]
            readOnlyRootFilesystem: false # Some python libs like scipy are writing to tmp folder
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          # Run by 'memgraph' user as specified in the Dockerfile
          {{- include "container.readinessProbe" .Values.container.readinessProbe | nindent 10 }}
          {{- include "container.livenessProbe" .Values.container.livenessProbe | nindent 10 }}
          {{- include "container.startupProbe" .Values.container.startupProbe | nindent 10 }}
          {{- if .Values.lifecycleHooks }}
          lifecycle:
            {{- toYaml .Values.lifecycleHooks | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.secrets.enabled }}
            - name: MEMGRAPH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.userKey }}
            - name: MEMGRAPH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.passwordKey }}
           {{- end }}
           {{ if .Values.memgraphEnterpriseLicense }}
            - name: MEMGRAPH_ENTERPRISE_LICENSE
              value: {{ .Values.memgraphEnterpriseLicense }}
            - name: MEMGRAPH_ORGANIZATION_NAME
              value: {{ .Values.memgraphOrganizationName}}
          {{- end}}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: {{ include "memgraph.fullname" . }}-lib-storage
              mountPath: /var/lib/memgraph
          {{- if .Values.persistentVolumeClaim.createLogStorage }}
            - name: {{ include "memgraph.fullname" . }}-log-storage
              mountPath: /var/log/memgraph
          {{- end }}
          {{- if .Values.persistentVolumeClaim.createCoreDumpsClaim }}
            - name: {{ include "memgraph.fullname" . }}-core-dumps-storage
              mountPath: {{ .Values.persistentVolumeClaim.coreDumpsMountPath }}
          {{- end }}
          {{- if .Values.persistentVolumeClaim.createUserClaim }}
            - name: {{ include "memgraph.fullname" . }}-user-storage
              mountPath: {{ .Values.persistentVolumeClaim.userMountPath }}
          {{- end }}
          {{- range .Values.customQueryModules }}
            - name: {{ .volume | quote }}
              mountPath: {{ printf "/var/lib/memgraph/internal_modules/%s" .file }}
              subPath: {{ .file | quote }}
          {{- end }}
          {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12}}
          {{- end }}
        {{- if and .Values.coreDumpUploader.enabled .Values.persistentVolumeClaim.createCoreDumpsClaim }}
        {{- include "memgraph.coreDumpUploader" (dict "volumeName" (printf "%s-core-dumps-storage" (include "memgraph.fullname" .)) "mountPath" .Values.persistentVolumeClaim.coreDumpsMountPath "values" .Values.coreDumpUploader) | nindent 8 }}
        {{- end }}
        {{- if and .Values.remoteCoreDumpUploader.enabled .Values.persistentVolumeClaim.createCoreDumpsClaim }}
        {{- include "memgraph.remoteCoreDumpUploader" (dict "volumeName" (printf "%s-core-dumps-storage" (include "memgraph.fullname" .)) "binaryVolumeName" (printf "%s-remote-uploader-binary" (include "memgraph.fullname" .)) "mountPath" .Values.persistentVolumeClaim.coreDumpsMountPath "values" .Values.remoteCoreDumpUploader) | nindent 8 }}
        {{- end }}
      {{- if .Values.vectorRemote.enabled }}
        - name: memgraph-vector
          image: "{{ .Values.vectorRemote.image.repository }}:{{ .Values.vectorRemote.image.tag }}"
          imagePullPolicy: {{ .Values.vectorRemote.image.pullPolicy }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
{{ include "memgraph.vector.script" . | indent 14 }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.vectorRemote.auth.secretName }}
            - name: MONITORING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vectorRemote.auth.secretName }}
                  key: {{ .Values.vectorRemote.auth.usernameKey }}
            - name: MONITORING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vectorRemote.auth.secretName }}
                  key: {{ .Values.vectorRemote.auth.passwordKey }}
            {{- end }}
            - name: ROLE
              value: {{ .Values.vectorRemote.extraLabels.role | default "standalone" | quote }}
            - name: CLUSTER_ID
              value: {{ .Values.vectorRemote.extraLabels.cluster_id | default "" | quote }}
            - name: SERVICE_NAME
              value: {{ .Values.vectorRemote.extraLabels.service_name | default "" | quote }}
            - name: CLUSTER_ENV
              value: {{ .Values.vectorRemote.extraLabels.cluster_env | default "" | quote }}
          {{- with .Values.vectorRemote.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeAffinity }}
      affinity:
        nodeAffinity:
          {{- toYaml . | nindent 10 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
  volumeClaimTemplates:
  {{- if .Values.persistentVolumeClaim.createStorageClaim }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ include "memgraph.fullname" . }}-lib-storage
      spec:
        accessModes:
        - {{ .Values.persistentVolumeClaim.libStorageAccessMode }}
        storageClassName: {{ .Values.persistentVolumeClaim.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistentVolumeClaim.storageSize }}
        {{- if .Values.persistentVolumeClaim.storageVolumeName }}
        volumeName: {{ .Values.persistentVolumeClaim.storageVolumeName }}
        {{- end }}
  {{- end }}

  {{- if .Values.persistentVolumeClaim.createLogStorage }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ include "memgraph.fullname" . }}-log-storage
      spec:
        accessModes:
        - "ReadWriteOnce"
        storageClassName: {{ .Values.persistentVolumeClaim.logStorageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistentVolumeClaim.logStorageSize }}
  {{- end }}

  {{- if .Values.persistentVolumeClaim.createCoreDumpsClaim }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ include "memgraph.fullname" . }}-core-dumps-storage
      spec:
        accessModes:
        - "ReadWriteOnce"
        storageClassName: {{ .Values.persistentVolumeClaim.coreDumpsStorageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistentVolumeClaim.coreDumpsStorageSize }}
  {{- end }}

  {{- if .Values.persistentVolumeClaim.createUserClaim }}
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{ include "memgraph.fullname" . }}-user-storage
      spec:
        accessModes:
        - {{ .Values.persistentVolumeClaim.userStorageAccessMode }}
        {{- if .Values.persistentVolumeClaim.userStorageClassName }}
        storageClassName: {{ .Values.persistentVolumeClaim.userStorageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistentVolumeClaim.userStorageSize }}
  {{- end }}

{{- if .Values.vmagentRemote.enabled }}
{{- $namespace := .Values.vmagentRemote.namespace | default .Values.prometheus.namespace }}
{{- $exporterNamespace := .Values.prometheus.namespace }}
{{- if and .Values.vmagentRemote.remoteWrite.basicAuth.secretName (not .Values.vmagentRemote.remoteWrite.basicAuth.usernameKey) }}
{{- fail "vmagentRemote.remoteWrite.basicAuth.usernameKey must be set when vmagentRemote.remoteWrite.basicAuth.secretName is provided" }}
{{- end }}
{{- if and .Values.vmagentRemote.remoteWrite.basicAuth.secretName (not .Values.vmagentRemote.remoteWrite.basicAuth.passwordKey) }}
{{- fail "vmagentRemote.remoteWrite.basicAuth.passwordKey must be set when vmagentRemote.remoteWrite.basicAuth.secretName is provided" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "memgraph.fullname" . }}-vmagent-config
  namespace: {{ $namespace }}
data:
  scrape.yml: |
    global:
      scrape_interval: {{ .Values.vmagentRemote.scrapeInterval }}
      {{- with .Values.vmagentRemote.externalLabels }}
      external_labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}

    scrape_configs:
      - job_name: memgraph-exporter
        static_configs:
          - targets:
              - mg-exporter.{{ $exporterNamespace }}.svc.cluster.local:{{ .Values.prometheus.memgraphExporter.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memgraph.fullname" . }}-vmagent
  namespace: {{ $namespace }}
  labels:
    app: {{ include "memgraph.fullname" . }}-vmagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "memgraph.fullname" . }}-vmagent
  template:
    metadata:
      labels:
        app: {{ include "memgraph.fullname" . }}-vmagent
    spec:
      containers:
        - name: vmagent
          image: "{{ .Values.vmagentRemote.image.repository }}:{{ .Values.vmagentRemote.image.tag }}"
          imagePullPolicy: {{ .Values.vmagentRemote.image.pullPolicy }}
          args:
            - -promscrape.config=/etc/vmagent/scrape.yml
            - -remoteWrite.url={{ required "vmagentRemote.remoteWrite.url must be set when vmagentRemote.enabled=true" .Values.vmagentRemote.remoteWrite.url }}
            {{- if .Values.vmagentRemote.remoteWrite.basicAuth.secretName }}
            - -remoteWrite.basicAuth.username=$(MONITORING_USERNAME)
            - -remoteWrite.basicAuth.password=$(MONITORING_PASSWORD)
            {{- end }}
            - -httpListenAddr=:{{ .Values.vmagentRemote.httpPort }}
            - -remoteWrite.tmpDataPath=/tmpData
          {{- if .Values.vmagentRemote.remoteWrite.basicAuth.secretName }}
          env:
            - name: MONITORING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vmagentRemote.remoteWrite.basicAuth.secretName }}
                  key: {{ .Values.vmagentRemote.remoteWrite.basicAuth.usernameKey }}
            - name: MONITORING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vmagentRemote.remoteWrite.basicAuth.secretName }}
                  key: {{ .Values.vmagentRemote.remoteWrite.basicAuth.passwordKey }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.vmagentRemote.httpPort }}
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/vmagent
              readOnly: true
            - name: data
              mountPath: /tmpData
          {{- with .Values.vmagentRemote.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "memgraph.fullname" . }}-vmagent-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memgraph.fullname" . }}-vmagent
  namespace: {{ $namespace }}
spec:
  selector:
    app: {{ include "memgraph.fullname" . }}-vmagent
  ports:
    - name: http
      port: {{ .Values.vmagentRemote.httpPort }}
      targetPort: {{ .Values.vmagentRemote.httpPort }}
{{- end }}
